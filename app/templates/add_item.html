{% extends "base.html" %}

{% block title %}Add Item - ShareTools{% endblock %}

{% block content %}
<div class="add-item-page">
    <h1>Add an Item to Share</h1>
    
    <form method="POST" class="form add-item-form">
        <div class="form-group">
            <label for="name">Item Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Power Drill">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Describe the item, condition, and any special instructions..."></textarea>
        </div>
        
        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="">Select a category</option>
                <option value="Tools">Tools</option>
                <option value="Books">Books</option>
                <option value="Electronics">Electronics</option>
                <option value="Sports">Sports</option>
                <option value="Garden">Garden</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Item</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
